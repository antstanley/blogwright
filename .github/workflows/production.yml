name: Deploy docs

# Deploy the docs site (docs/ workspace) to blogwright.iamstan.dev: docs-only
# changes go live when they merge to main (path-filtered push), and every GitHub
# release republishes the docs so they always track the released CLI — a no-op
# when nothing changed, since the sync only uploads and invalidates files whose
# content differs. PR previews deploy continuously (see preview.yml). The deploy
# dogfoods the workspace's own CLI — packages/cli is built from source here, not
# installed from npm.
on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "config/production.jsonc"
      - ".github/workflows/production.yml"

# Queue production deploys instead of cancelling: killing a mid-run deploy leaks a
# running MicroVM and its pending job marker.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write # assume the AWS role via OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  # Created by `blogwright bootstrap production` (gh-oidc-role node; requires config.githubRepo).
  ROLE_ARN: arn:aws:iam::115019372186:role/production-blogwright-gh

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Scopes the OIDC token subject to `…:environment:production` (the OIDC role's trust
    # policy requires it) and lets deploys be gated behind environment protection rules.
    environment:
      name: production
      url: https://blogwright.iamstan.dev
    steps:
      # A release event checks out the release's tag commit — that revision is what
      # gets built and published.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build the blogwright CLI
        # The CLI and its workspace dependencies only — the docs site itself is
        # built inside the MicroVM, not on this runner.
        run: pnpm --filter blogwright... build
      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy docs to production
        # Invoke the built bin directly: the node_modules/.bin link is only
        # created if dist/bin.js exists at install time, which it doesn't in CI.
        run: node packages/cli/dist/bin.js deploy production
