name: Version PR

# Maintains the "Version Packages" pull request from pending changesets:
# every push to main folds new .changeset/*.md files into one PR that previews
# the version bump and CHANGELOGs. Merging that PR is the release-prep commit;
# tagging it (git tag vX.Y.Z) hands over to release.yml for staged publishing.
# This workflow never publishes.
on:
  push:
    branches: [main]

concurrency: version-pr-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create or update the Version Packages PR
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset:version
          title: "Release: version packages"
          commit: "Version packages for release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
